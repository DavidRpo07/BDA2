services:
  pg_shard_2:
    image: postgres:17
    container_name: pg_shard_2
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: walletdb
    ports:
      - "5432:5432"
    volumes:
      - ../../scripts/postgres/shard2/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: postgres -c listen_addresses='*' -c max_prepared_transactions=100