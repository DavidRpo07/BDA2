version: "3.9"

services:
  crdb1:
    image: cockroachdb/cockroach:v23.2.30
    container_name: crdb1
    hostname: crdb1
    command: >
      start
      --insecure
      --store=/cockroach/cockroach-data
      --listen-addr=0.0.0.0:26257
      --http-addr=0.0.0.0:8080
      --advertise-addr=crdb1:26257
      --join=crdb1:26257,crdb2:26257,crdb3:26257
      --cache=.25
      --max-sql-memory=.25
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - crdb1-data:/cockroach/cockroach-data
    networks:
      - crdbnet

  crdb2:
    image: cockroachdb/cockroach:v23.2.30
    container_name: crdb2
    hostname: crdb2
    command: >
      start
      --insecure
      --store=/cockroach/cockroach-data
      --listen-addr=0.0.0.0:26257
      --http-addr=0.0.0.0:8080
      --advertise-addr=crdb2:26257
      --join=crdb1:26257,crdb2:26257,crdb3:26257
      --cache=.25
      --max-sql-memory=.25
    ports:
      - "26258:26257"
      - "8081:8080"
    volumes:
      - crdb2-data:/cockroach/cockroach-data
    networks:
      - crdbnet

  crdb3:
    image: cockroachdb/cockroach:v23.2.30
    container_name: crdb3
    hostname: crdb3
    command: >
      start
      --insecure
      --store=/cockroach/cockroach-data
      --listen-addr=0.0.0.0:26257
      --http-addr=0.0.0.0:8080
      --advertise-addr=crdb3:26257
      --join=crdb1:26257,crdb2:26257,crdb3:26257
      --cache=.25
      --max-sql-memory=.25
    ports:
      - "26259:26257"
      - "8082:8080"
    volumes:
      - crdb3-data:/cockroach/cockroach-data
    networks:
      - crdbnet

volumes:
  crdb1-data:
  crdb2-data:
  crdb3-data:

networks:
  crdbnet:
    driver: bridge